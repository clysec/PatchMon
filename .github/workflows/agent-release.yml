name: Release Binaries

# Fires when a GitHub release is published (draft → published, or direct publish).
# NOTE: the `tags:` filter is not a valid key under `on.release` in GitHub Actions
# and was silently ignored. If you want to restrict by tag pattern, add
# `if: startsWith(github.event.release.tag_name, 'v')` to each job.
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  agent:
    name: Build Agent Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: 'amd64'
          - goos: linux
            goarch: 'arm64'
          - goos: linux
            goarch: 'arm'
          # - goos: linux
          #   goarch: '386'
          # - goos: freebsd
          #   goarch: 'amd64'
          # - goos: freebsd
          #   goarch: 'arm64'
          # - goos: freebsd
          #   goarch: '386'
          # - goos: freebsd
          #   goarch: 'arm'
          - goos: windows
            goarch: 'amd64'
          # - goos: windows
          #   goarch: 'arm64'

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417
        with:
          go-version-file: 'agent-source-code/go.mod'

      - name: Download dependencies
        working-directory: agent-source-code
        run: go mod download

      - name: Build binary
        working-directory: agent-source-code
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ (matrix.goos == 'linux' || matrix.goos == 'freebsd') && matrix.goarch == 'arm' && '6' || '' }}
          CGO_ENABLED: 0
        run: |
          OUTPUT_BASE="patchmon-agent-${{ matrix.goos }}-${{ matrix.goarch }}"
          OUTPUT_NAME="${OUTPUT_BASE}${{ matrix.goos == 'windows' && '.exe' || '' }}"
          # Strip leading "v" so "v2.0.0" becomes "2.0.0" — diagnostics.go prints
          # "v%s" and would otherwise emit "vv2.0.0".
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          go build -buildvcs=false \
            -ldflags="-s -w -X patchmon-agent/internal/pkgversion.Version=${VERSION}" \
            -o "${OUTPUT_NAME}" ./cmd/patchmon-agent

      - name: Verify binary exists and is executable
        working-directory: agent-source-code
        run: |
          OUTPUT_BASE="patchmon-agent-${{ matrix.goos }}-${{ matrix.goarch }}"
          OUTPUT_NAME="${OUTPUT_BASE}${{ matrix.goos == 'windows' && '.exe' || '' }}"
          if [ ! -f "${OUTPUT_NAME}" ]; then
            echo "❌ Error: Binary ${OUTPUT_NAME} was not created"
            exit 1
          fi
          [ "${{ matrix.goos }}" != "windows" ] && chmod +x "${OUTPUT_NAME}" || true
          ls -lh "${OUTPUT_NAME}"
          echo "✅ Binary ${OUTPUT_NAME} created successfully"

      - name: Verify binary architecture and type
        working-directory: agent-source-code
        run: |
          OUTPUT_BASE="patchmon-agent-${{ matrix.goos }}-${{ matrix.goarch }}"
          OUTPUT_NAME="${OUTPUT_BASE}${{ matrix.goos == 'windows' && '.exe' || '' }}"
          echo "📋 Binary information:"
          file "${OUTPUT_NAME}"

          # Verify it's a Linux/FreeBSD binary (ELF format)
          if [ "${{ matrix.goos }}" = "linux" ] || [ "${{ matrix.goos }}" = "freebsd" ]; then
            if ! file "${OUTPUT_NAME}" | grep -qE "(ELF|Linux)"; then
              echo "❌ Error: Binary is not a Linux/FreeBSD binary (expected ELF format)"
              exit 1
            fi
            echo "✅ Verified: ${{ matrix.goos }} binary (ELF format)"
          # Verify it's a Windows binary (PE format)
          elif [ "${{ matrix.goos }}" = "windows" ]; then
            if ! file "${OUTPUT_NAME}" | grep -qE "(PE32|Windows)"; then
              echo "❌ Error: Binary is not a Windows binary (expected PE format)"
              exit 1
            fi
            echo "✅ Verified: Windows binary (PE format)"
          fi

      - name: Test binary basic functionality
        working-directory: agent-source-code
        run: |
          OUTPUT_BASE="patchmon-agent-${{ matrix.goos }}-${{ matrix.goarch }}"
          OUTPUT_NAME="${OUTPUT_BASE}${{ matrix.goos == 'windows' && '.exe' || '' }}"

          # Test version command (if available)
          if [ "${{ matrix.goos }}" = "linux" ] && [ "${{ matrix.goarch }}" = "amd64" ]; then
            echo "🧪 Testing binary functionality..."
            ./"${OUTPUT_NAME}" --version || ./"${OUTPUT_NAME}" version || echo "Version command not available (may require config)"
            ./"${OUTPUT_NAME}" --help || ./"${OUTPUT_NAME}" help || echo "Help command not available"
            echo "✅ Basic functionality test passed"
          else
            echo "⏭️  Skipping functionality test for ${{ matrix.goos }}/${{ matrix.goarch }} (requires native architecture)"
          fi

      - name: Verify static linking (Linux/FreeBSD)
        if: matrix.goos == 'linux' || matrix.goos == 'freebsd'
        working-directory: agent-source-code
        run: |
          OUTPUT_NAME="patchmon-agent-${{ matrix.goos }}-${{ matrix.goarch }}"
          echo "🔍 Checking binary dependencies..."

          # Check if binary is statically linked (should have minimal or no dynamic dependencies)
          if command -v ldd &> /dev/null; then
            DEPS=$(ldd "${OUTPUT_NAME}" 2>/dev/null | wc -l || echo "0")
            if [ "$DEPS" -gt "3" ]; then
              echo "⚠️  Warning: Binary may have dynamic dependencies:"
              ldd "${OUTPUT_NAME}" 2>/dev/null || true
            else
              echo "✅ Binary appears to be statically linked (minimal dependencies)"
            fi
          fi

          # Check for GLIBC version requirements
          if command -v objdump &> /dev/null; then
            echo "🔍 Checking GLIBC version requirements..."
            GLIBC_VERSIONS=$(objdump -T "${OUTPUT_NAME}" 2>/dev/null | grep "GLIBC_" | sed 's/.*GLIBC_\([0-9.]*\).*/\1/' | sort -V -u || echo "")
            if [ -n "$GLIBC_VERSIONS" ]; then
              echo "📌 GLIBC versions required:"
              echo "$GLIBC_VERSIONS"
              # Check if any version is > 2.28 (Debian Buster)
              HIGHEST=$(echo "$GLIBC_VERSIONS" | tail -1)
              if [ -n "$HIGHEST" ]; then
                echo "ℹ️  Highest GLIBC requirement: $HIGHEST"
                echo "✅ With CGO_ENABLED=0, binary should work on Debian Buster (GLIBC 2.28)"
              fi
            else
              echo "✅ No GLIBC version requirements found (statically linked)"
            fi
          fi

      - name: Upload agent binary to release
        uses: softprops/action-gh-release@b25b93d384199fc0fc8c2e126b2d937a0cbeb2ae
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: agent-source-code/patchmon-agent-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }}

      - name: Build summary
        run: |
          echo "📦 Build Summary:"
          echo "  OS: ${{ matrix.goos }}"
          echo "  Architecture: ${{ matrix.goarch }}"
          echo "  CGO_ENABLED: 0 (static linking)"
          echo ""
          echo "✅ Binary built and uploaded to release"

  patchmon-server:
    name: Build patchmon-server Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
          - goos: linux
            goarch: 386

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: "package.json"
          cache: "npm"

      - name: Build frontend for embed
        env:
          # Inject the release tag into the Vite build so the UI reports the
          # correct version, overriding the placeholder in frontend/env.example.
          VITE_APP_VERSION: ${{ github.event.release.tag_name }}
        run: |
          npm ci
          npm run build --workspace=frontend
          mkdir -p server-source-code/cmd/server/static/frontend
          cp -r frontend/dist server-source-code/cmd/server/static/frontend/

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417
        with:
          go-version-file: 'server-source-code/go.mod'

      - name: Download dependencies
        working-directory: server-source-code
        run: go mod download

      - name: Build patchmon-server
        working-directory: server-source-code
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarch == 'arm' && '6' || '' }}
          CGO_ENABLED: 0
        run: |
          OUTPUT_NAME="patchmon-server-${{ matrix.goos }}-${{ matrix.goarch }}"
          # Strip leading "v" so a "v2.0.0" tag becomes "2.0.0" (matches semver
          # in config.go and what the UI expects for version comparisons).
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          go build -buildvcs=false \
            -ldflags="-s -w -X 'github.com/PatchMon/PatchMon/server-source-code/internal/config.DefaultVersion=${VERSION}'" \
            -o "${OUTPUT_NAME}" ./cmd/server
          mv "${OUTPUT_NAME}" ../

      - name: Upload patchmon-server to release
        uses: softprops/action-gh-release@b25b93d384199fc0fc8c2e126b2d937a0cbeb2ae
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: patchmon-server-${{ matrix.goos }}-${{ matrix.goarch }}
